<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BeatsByMax — Musical Improv Freestyle Practice Tool</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <header>
    <h1 class="brand">BeatsByMax</h1>
    <div class="subtitle">Musical Improv Freestyle Practice Tool</div>
  </header>

  <section class="transport card">
    <div class="transport-row">
      <button id="playBtn" class="primary play-btn">Play</button>
      <div class="master-vol">
        <span class="vol-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </span>
        <input type="range" id="master" aria-label="Master volume" min="0" max="100" value="75" />
      </div>
    </div>
  </section>

  <section class="sequencer card">
    <div class="card-head">
      <h2>Drums</h2>
      <button id="randBeatBtn">Randomize Beat</button>
    </div>

    <div class="tempo-and-preset">
      <div class="tempo-grid">
        <div class="control control-bpm">
          <label for="bpm">
            <span>BPM</span>
            <span class="bpm-extras">
              <input type="number" id="bpmNum" class="num" min="60" max="240" value="92" />
              <button id="tapBtn" class="tap-btn">Tap</button>
            </span>
          </label>
          <input type="range" id="bpm" min="60" max="240" value="92" />
        </div>
        <div class="control">
          <label for="swing">Swing <span id="swingVal" class="num">0%</span></label>
          <input type="range" id="swing" min="0" max="66" value="0" />
        </div>
      </div>
      <div class="drum-preset-wrap">
        <select id="drumPreset" class="preset-select" aria-label="Drum preset"></select>
      </div>
    </div>

    <div id="grid" class="grid"></div>
  </section>

  <section class="chords card">
    <div class="card-head">
      <h2>Chords</h2>
      <div class="card-actions">
        <button id="muteAllChordsBtn">Mute All</button>
        <button id="randChordBtn">Randomize</button>
      </div>
    </div>

    <div class="chord-globals">
      <div class="control">
        <label for="key">Key</label>
        <select id="key"></select>
      </div>
      <div class="control">
        <label for="scale">Scale</label>
        <select id="scale">
          <option value="major">Major</option>
          <option value="minor" selected>Natural Minor</option>
          <option value="dorian">Dorian</option>
          <option value="phrygian">Phrygian</option>
          <option value="mixolydian">Mixolydian</option>
          <option value="pentMinor">Pentatonic Minor</option>
        </select>
      </div>
      <div class="control">
        <label for="chordsPerBar">Chords per Bar</label>
        <select id="chordsPerBar">
          <option value="1" selected>1</option>
          <option value="2">2</option>
          <option value="4">4</option>
        </select>
      </div>
    </div>

    <div class="preset-row">
      <select id="chordPreset" class="preset-select" aria-label="Chord progression preset"></select>
    </div>

    <div class="chord-slots" id="chordSlots"></div>
  </section>

  <footer>
    <small>Created by Max Housner · 2026</small>
  </footer>
</div>

<script src="app.js"></script>
</body>
</html>
